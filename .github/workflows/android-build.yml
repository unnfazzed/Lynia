name: Build Android APK (free local build)
# Re-trigger: run with EXPO_TOKEN secret configured.

# Builds an installable Android APK on a free GitHub-hosted runner using `eas build --local`.
# Local builds do NOT consume EAS cloud build credits, and this repo is public so Actions minutes
# are free — a zero-cost way to get a dev/QA build without the EAS cloud queue.
#
# Setup (one-time): add a repo secret EXPO_TOKEN (Settings → Secrets and variables → Actions → New
# repository secret) with an Expo access token from https://expo.dev/settings/access-tokens.
# The Google Maps key is read from the EAS `preview` environment (the GOOGLE_MAPS_API_KEY EAS secret),
# so it does not need to be duplicated here.

on:
  workflow_dispatch: {}
  push:
    branches: [claude/phase-3-build-deploy-wbiqw0]
    paths:
      - "apps/mobile/**"
      - "packages/shared/**"
      - ".npmrc"
      - ".github/workflows/android-build.yml"

jobs:
  android:
    name: eas build --local (android)
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build @lynia/shared
        run: pnpm --filter @lynia/shared build

      # oss.sonatype.org (Sonatype OSSRH) is decommissioned and returns 504 for every artifact it's
      # queried for, which fatally aborts Gradle resolution (React Native 0.76's build config still
      # references it). A Gradle init script in ~/.gradle/init.d is auto-applied to every Gradle run
      # (including eas build --local's) and strips that repo from all projects — however it was
      # declared — so resolution falls through to Maven Central where the artifacts actually live.
      - name: Strip dead oss.sonatype.org repo (Gradle init script)
        run: |
          mkdir -p "$HOME/.gradle/init.d"
          cat > "$HOME/.gradle/init.d/remove-sonatype.gradle" <<'GRADLE'
          // RN's Gradle plugin adds oss.sonatype.org (now 504-ing) programmatically, in afterEvaluate,
          // before mavenCentral. Remove it in projectsEvaluated, which runs AFTER all afterEvaluate
          // callbacks — so the removal reliably lands after RN adds it.
          gradle.projectsEvaluated { g ->
              g.rootProject.allprojects { p ->
                  def removed = p.repositories.removeAll { r ->
                      try { r.url != null && r.url.toString().contains('oss.sonatype.org') } catch (ignored) { false }
                  }
                  if (removed) { println '[init remove-sonatype] stripped from ' + p.path }
              }
          }
          GRADLE

      - name: EAS local build (no cloud credits)
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli@latest build \
            --platform android \
            --profile preview \
            --local \
            --non-interactive \
            --output "${{ github.workspace }}/lynia.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lynia-android-apk
          path: lynia.apk
          if-no-files-found: error
